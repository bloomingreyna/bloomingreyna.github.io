<!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Weldi's Cleaning - Book Online</title>
        <link rel="shortcut icon" href="../General/Images/weldigold.png" type="image/x-icon">

        <link rel="stylesheet" href="../General/Stylesheets/main.css">
        <link rel="stylesheet" href="book_style.css">

        <script src="../General/Scripts/custom_elements.js" defer></script>
        <script src="script.js" defer></script>
    </head>

    <body>
        <site-header></site-header>

        <section class="page-banner" style="background-image: linear-gradient(rgba(0, 0, 0, 0.35)), url(../General/Images/car\ d.webp);">
            <img class="banner-element banner-logo" src="../General/Images/weldigold.png" alt="">
            <div class="column-container banner-element">
                <h1 class="banner-title">BOOKING FORM</h1>
                <h2 class="banner-subtitle"><i>We hope to see you soon!</i></h2>
            </div>
        </section>

        <section id="booking-form">
            <form id="form" action="" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                <div id="form-box" class="floating-box">
                    <div class="column-container">
                        <label>FIRST NAME:</label>
                        <input type="text" name="First Name" id="client-first-name-input">
                    </div>
                    <div class="column-container">
                        <label>LAST NAME:</label>
                        <input type="text" name="Last Name" id="client-last-name-input">
                    </div>
                    <div class="column-container">
                        <label>EMAIL:</label>
                        <input type="text" name="Email" id="client-email-input">
                    </div>
                    <div class="column-container">
                        <label>PHONE:</label>
                        <input type="text" name="Phone" id="client-phone-number-input">
                    </div>
                    <div class="column-container">
                        <label>ADDRESS:</label>
                        <input type="text" name="Address" id="client-address-input">
                    </div>
                    <div class="column-container" style="gap: 5px;">
                        <label>SERVICES:</label>
                        <div class="row-container">
                            <input type="checkbox" name="Services" id="" value="Window Cleaning">
                            <label class="checkbox-label">Window Cleaning</label>
                        </div>
                        <div class="row-container">
                            <input type="checkbox" name="Services" id="" value="Auto Detailing">
                            <label class="checkbox-label">Auto Detailing</label>
                        </div>
                        <div class="row-container">
                            <input type="checkbox" name="" id="">
                            <label class="checkbox-label">Solar Panel Cleaning</label>
                        </div>
                        <div class="row-container">
                            <input type="checkbox" name="" id="">
                            <label class="checkbox-label">Gutter Cleaning</label>
                        </div>
                        <div class="row-container">
                            <input type="checkbox" name="" id="">
                            <label class="checkbox-label">Lawn Care</label>
                        </div>
                        <div class="row-container">
                            <input type="checkbox" name="" id="">
                            <label class="checkbox-label">Hedge Trimming</label>
                        </div>
                    </div>
                </div>

                <div id="summary-column" class="column-container" style="gap: 20px; align-items: center;">
                    <div class=floating-box>
                        <h2 class="floating-box">ORDER SUMMARY</h1>
                        <hr>
                        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Inventore recusandae facere praesentium in excepturi temporibus cupiditate quos illo corporis porro harum maxime debitis, velit natus nihil repudiandae dolore, mollitia culpa.</p>
                    </div>
                    <button id="submit-button" type="submit" style="width: 10rem">SUBMIT</button>
                </div>
            </form>
        </section>

        <site-footer></site-footer>
    </body>
</html>
